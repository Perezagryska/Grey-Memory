<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Grey Memory</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://pygame-web.github.io/archives/0.8/pygbag.js"></script>
    <style>
        body { margin:0; background:#000; color:#fff; overflow:hidden; font-family:sans-serif; }
        #status { position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); }
    </style>
</head>
<body>
    <div id="status">Загрузка разума...</div>
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <script type="application/python">
# Этот блок пустой, он нужен просто чтобы активировать загрузчик
    </script>

    <script>
        window.addEventListener('load', async () => {
            const status = document.getElementById('status');
            try {
                // Пытаемся запустить игру из текущей папки
                await startPygbag('grey_memory', document.getElementById('canvas'));
                status.style.display = 'none';
            } catch (e) {
                status.innerText = "Ошибка загрузки. Проверь main.py";
                console.error(e);
            }
        });
    </script>
</body>
</html>
