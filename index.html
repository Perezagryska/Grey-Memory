<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Grey Memory</title>
    <script src="https://pygame-web.github.io/archives/0.8/pygbag.js"></script>
    <style>
        body { margin:0; background:#000; overflow:hidden; display:flex; justify-content:center; align-items:center; height:100vh; }
        canvas { width:100vw; height:100vh; object-fit:contain; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script type="application/python">
import pygame
import asyncio
import sys

pygame.init()
WIDTH, HEIGHT = 1280, 720
screen = pygame.display.set_mode((WIDTH, HEIGHT))

WHITE = (240, 240, 240)
BLACK = (15, 15, 15)

async def main():
    font = pygame.font.SysFont("Arial", 60)
    btn_rect = pygame.Rect(WIDTH//2-150, HEIGHT//2-50, 300, 100)
    
    while True:
        for event in pygame.event.get():
            if event.type == pygame.QUIT:
                pygame.quit()
                sys.exit()

        screen.fill((20, 20, 20)) # Темно-серый фон
        
        pygame.draw.rect(screen, WHITE, btn_rect, 3, border_radius=15)
        text = font.render("START GAME", True, WHITE)
        screen.blit(text, (btn_rect.centerx - text.get_width()//2, btn_rect.centery - text.get_height()//2))

        pygame.display.flip()
        await asyncio.sleep(0)

asyncio.run(main())
    </script>
    <script>
        window.addEventListener('load', async () => {
            // Запускаем движок прямо из этого файла
            await startPygbag('game', document.getElementById('canvas'));
        });
    </script>
</body>
</html>
